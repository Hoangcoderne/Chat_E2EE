<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SecureChat E2EE</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <h2 class="text-center">Đăng nhập</h2>
        <p class="text-center text-sub text-gray">Khôi phục khóa bảo mật</p>

        <div id="error-msg" class="error"></div>
        <div id="success-msg" class="success"></div>

        <form id="login-form">
            <input type="text" id="username" placeholder="Tên đăng nhập" required autocomplete="off">
            <input type="password" id="password" placeholder="Mật khẩu" required>
            
            <button type="submit" id="btn-submit" class="btn-green">Đăng nhập</button>
        </form>
        
        <p class="text-center mt-15">
            Chưa có tài khoản? <a href="register.html">Đăng ký</a>
        </p>
        <p class="text-center mt-8">
            <a href="forgot-password.html" class="link-muted text-xs">Quên mật khẩu?</a>
        </p>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
