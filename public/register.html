<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - SecureChat E2EE</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <h2 class="text-center mb-4">SecureChat Đăng ký</h2>
        <p class="text-center text-sub text-gray mb-16">Mã hóa đầu cuối (E2EE)</p>

        <div id="error-msg" class="error"></div>
        <div id="success-msg" class="success"></div>

        <form id="register-form">
            <!-- Username -->
            <input type="text" id="username" placeholder="Tên đăng nhập" required autocomplete="off" class="mb-2">
            <div id="username-hint"></div>

            <input type="password" id="password" placeholder="Mật khẩu" required minlength="8">
            <!-- Strength indicator -->
            <div class="strength-wrap">
                <div class="strength-bar"><div id="strength-bar-fill"></div></div>
                <span id="strength-hint"></span>
            </div>
            <ul id="password-tips"></ul>

            <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu" required>

            <button type="submit" id="btn-submit" class="mt-12">Đăng ký & Tạo Khóa</button>
        </form>

        <p class="text-center mt-15 text-sm">
            Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </p>
    </div>

    <script type="module" src="js/register.js"></script>
</body>
</html>
